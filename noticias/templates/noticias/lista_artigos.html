<!DOCTYPE html>
<html>
<head><title>Jornal Online</title></head>
<body>
    <h1>Jornal Online</h1>
    <hr>
    <ul>
      {% for artigo in artigos %}
        <li>
            <h2><a href="{% url 'detalhe_artigo' artigo.id %}">{{ artigo.titulo }}</a></h2>
        </li>
      {% empty %}
        <p>Ainda não há artigos publicados.</p>
      {% endfor %}
    </ul>
</body>
</html>
